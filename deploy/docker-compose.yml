networks:
  app-network:
    driver: bridge

volumes:
  app-data:
    driver: local
  playwright-data:
    driver: local

services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "8080"
      ACCOUNTS_FILE: /data/accounts.json
    volumes:
      - ./accounts.json:/data/accounts.json
      - playwright-data:/root/.cache
    shm_size: '256mb'
    networks:
      - app-network
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1024M

  frontend:
    build:
      context: ../web
      dockerfile: ../frontend/Dockerfile
      args:
        VITE_WS_URL: wss://hh.lykosov.tech/ws
    restart: unless-stopped
    networks:
      - app-network
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    networks:
      - app-network
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M
